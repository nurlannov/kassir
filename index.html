<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>QR Сканер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* Верхняя панель (с фонариком) */
        .top-bar { height: 56px; background: #020617; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #1f2937; z-index: 10; }
        .top-bar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; flex: 1; text-align: center; margin: 0 10px; }
        .back-icon, .flash-icon { font-size: 20px; color: #fff; text-decoration: none; cursor: pointer; width: 24px; display: flex; align-items: center; justify-content: center;}
        .flash-icon { font-size: 18px; }

        /* Окно камеры */
        .camera-wrapper { position: relative; flex: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; left: 0; right: 0; top: 50%; height: 2px;
            background: #facc15; box-shadow: 0 0 15px #facc15;
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-120px); }
            50% { transform: translateY(120px); }
        }

        /* --- НОВЫЙ БАННЕР "БИЛЕТ ПРОЙДЕН" (КАК НА СКРИНШОТЕ) --- */
        #ticketBanner {
            display: none; /* Скрыт по умолчанию */
            position: absolute;
            top: 70px; /* Сдвинут чуть ниже верхней панели */
            left: 16px; 
            right: 16px;
            
            /* Стили фигуры как на скриншоте */
            background: #fff;
            color: #111827;
            border-radius: 8px; /* Скругленные углы */
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 100;
            overflow: hidden; /* Чтобы зеленая полоса не вылезала */
            
            /* Анимация плавного появления */
            animation: slideIn 0.3s ease-out;
        }

        /* Зеленая полоса слева (акцент) */
        #ticketBanner::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px; /* Ширина зеленой полоски */
            background: #22c55e; /* Насыщенный зеленый */
        }

        /* Контент внутри баннера */
        .banner-content {
            padding: 18px 18px 18px 24px; /* Учитываем зеленую полосу */
            display: flex;
            align-items: center;
            gap: 12px; /* Расстояние между иконкой и текстом */
        }

        /* Иконка (зеленый чекбокс) */
        .banner-icon {
            font-size: 22px;
            color: #22c55e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Текст внутри баннера */
        .banner-text-block {
            display: flex;
            flex-direction: column;
        }
        .banner-status {
            font-size: 15px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 2px;
        }
        .banner-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
        }

        /* Анимация появления */
        @keyframes slideIn {
            from { transform: translateY(-30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        /* --- КОНЕЦ СТИЛЕЙ БАННЕРА --- */

        .bottom-bar { height: 80px; background: #020617; display: flex; align-items: center; padding: 0 16px 20px; border-top: 1px solid #1f2937; }
        .manual-btn { width: 100%; border-radius: 12px; border: none; background: #1f2937; color: #fff; padding: 14px; font-weight: 600; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body onclick="unlockAudio()"> <div class="app">
    <div class="top-bar">
        <a href="#" class="back-icon">‹</a>
        <div class="top-bar-title">СКАНИРУЙТЕ (QR ИЛИ BAR)-КОД БИЛЕТА</div>
        <div class="flash-icon">🔦</div>
    </div>

    <div id="ticketBanner">
        <div class="banner-content">
            <div class="banner-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" fill="currentColor"/>
                </svg>
            </div>
            <div class="banner-text-block">
                <span class="banner-status">Успешно</span>
                <span class="banner-title">БИЛЕТ ПРОЙДЕН</span>
            </div>
        </div>
    </div>
    <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="scan-line"></div>
    </div>

    <div class="bottom-bar">
        <button class="manual-btn">Ввести вручную</button>
    </div>
</div>

<script>
    // --- ТВОЙ ОРИГИНАЛЬНЫЙ JS КОД (ЛОГИКА НЕ МЕНЯЛАСЬ) ---
    const video = document.getElementById('video');
    const banner = document.getElementById('ticketBanner');
    const beepSound = new Audio('https://www.myinstants.com/media/sounds/iphone-apple-store-sound.mp3');
    
    let isAudioUnlocked = false;

    // Функция для Safari: разблокирует звук при первом тапе по экрану
    function unlockAudio() {
        if (!isAudioUnlocked) {
            beepSound.play().then(() => {
                beepSound.pause();
                beepSound.currentTime = 0;
                isAudioUnlocked = true;
                console.log("Звук разблокирован для Safari");
            }).catch(e => console.log("Ждем реального клика..."));
        }
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let lastScanTime = 0;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
        } catch (err) {
            alert("Нужен доступ к камере и HTTPS");
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && (Date.now() - lastScanTime > 3000)) {
                lastScanTime = Date.now();
                onTicketDetected();
            }
        }
        requestAnimationFrame(tick);
    }

    function onTicketDetected() {
        // Твоя логика звука
        beepSound.currentTime = 0;
        beepSound.play().catch(e => console.log("Кликни по экрану один раз!"));

        // Твоя логика баннера: показываем через display: block
        banner.style.display = 'block';

        // Прячем обратно через 2 секунды
        setTimeout(() => {
            banner.style.display = 'none';
        }, 2000);
    }

    startCamera();
</script>
</body>
</html>
