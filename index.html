<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Сканер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 56px; background: #020617; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #1f2937; }
        .top-bar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .camera-wrapper { position: relative; flex: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; left: 0; right: 0; top: 50%; height: 2px;
            background: #facc15; box-shadow: 0 0 15px #facc15;
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-120px); }
            50% { transform: translateY(120px); }
        }

        /* БАННЕР - ИСПРАВЛЕНО: ТЕПЕРЬ ОН СКРЫТ ЧЕРЕЗ DISPLAY NONE */
        #ticketBanner {
            display: none; /* Полное скрытие */
            position: absolute; top: 56px; left: 0; right: 0;
            background: #16a34a; color: #fff; text-align: center;
            padding: 16px; font-weight: 700; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .bottom-bar { height: 80px; background: #020617; display: flex; align-items: center; padding: 0 16px 20px; }
        .manual-btn { width: 100%; border-radius: 12px; border: none; background: #1f2937; color: #fff; padding: 14px; font-weight: 600; }
    </style>
</head>
<body onclick="unlockAudio()"> <div class="app">
    <div class="top-bar"><div class="top-bar-title">СКАНИРОВАНИЕ</div></div>

    <div id="ticketBanner">БИЛЕТ НАЙДЕН</div>

    <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="scan-line"></div>
    </div>

    <div class="bottom-bar">
        <button class="manual-btn">Ввести вручную</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const banner = document.getElementById('ticketBanner');
    const beepSound = new Audio('https://www.myinstants.com/media/sounds/iphone-apple-store-sound.mp3');
    
    let isAudioUnlocked = false;

    // Функция для Safari: разблокирует звук при первом тапе по экрану
    function unlockAudio() {
        if (!isAudioUnlocked) {
            beepSound.play().then(() => {
                beepSound.pause();
                beepSound.currentTime = 0;
                isAudioUnlocked = true;
                console.log("Звук разблокирован для Safari");
            }).catch(e => console.log("Ждем реального клика..."));
        }
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let lastScanTime = 0;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
        } catch (err) {
            alert("Нужен доступ к камере и HTTPS");
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && (Date.now() - lastScanTime > 3000)) {
                lastScanTime = Date.now();
                onTicketDetected();
            }
        }
        requestAnimationFrame(tick);
    }

    function onTicketDetected() {
        // Звук
        beepSound.currentTime = 0;
        beepSound.play().catch(e => console.log("Кликни по экрану один раз!"));

        // Баннер: показываем через display: block
        banner.style.display = 'block';

        // Прячем обратно через 2 секунды
        setTimeout(() => {
            banner.style.display = 'none';
        }, 2000);
    }

    startCamera();
</script>
</body>
</html>
