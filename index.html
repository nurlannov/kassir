<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>QR Сканер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 56px; background: #020617; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #1f2937; z-index: 10; }
        .top-bar-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; flex: 1; text-align: center; }
        .back-icon, .flash-icon { font-size: 20px; color: #fff; text-decoration: none; width: 24px; display: flex; align-items: center; justify-content: center;}

        .camera-wrapper { position: relative; flex: 1; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; left: 0; right: 0; top: 50%; height: 2px;
            background: #facc15; box-shadow: 0 0 15px #facc15;
            animation: scan 2s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-120px); }
            50% { transform: translateY(120px); }
        }

        /* --- ОБНОВЛЕННЫЙ МИНИМАЛИСТИЧНЫЙ БАННЕР --- */
        #ticketBanner {
            display: none;
            position: absolute;
            top: 70px;
            left: 16px; 
            right: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 100;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        #ticketBanner::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px;
            background: #22c55e; 
        }

        .banner-content {
            padding: 20px; /* Увеличил отступ для центровки */
            display: flex;
            align-items: center;
            justify-content: center; /* Центрируем текст */
        }

        .banner-title {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
            text-transform: uppercase; /* Делаем надпись чуть строже */
            letter-spacing: 0.5px;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .bottom-bar { height: 80px; background: #020617; display: flex; align-items: center; padding: 0 16px 20px; border-top: 1px solid #1f2937; }
        .manual-btn { width: 100%; border-radius: 12px; border: none; background: #1f2937; color: #fff; padding: 14px; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body onclick="unlockAudio()">

<div class="app">
    <div class="top-bar">
        <div class="back-icon">‹</div>
        <div class="top-bar-title">СКАНИРОВАНИЕ БИЛЕТА</div>
        <div class="flash-icon">🔦</div>
    </div>

    <div id="ticketBanner">
        <div class="banner-content">
            <span class="banner-title">БИЛЕТ ПРОЙДЕН</span>
        </div>
    </div>

    <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="scan-line"></div>
    </div>

    <div class="bottom-bar">
        <button class="manual-btn">Ввести вручную</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const banner = document.getElementById('ticketBanner');
    const beepSound = new Audio('https://www.myinstants.com/media/sounds/iphone-apple-store-sound.mp3');
    
    let isAudioUnlocked = false;

    function unlockAudio() {
        if (!isAudioUnlocked) {
            beepSound.play().then(() => {
                beepSound.pause();
                beepSound.currentTime = 0;
                isAudioUnlocked = true;
            }).catch(() => {});
        }
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let lastScanTime = 0;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' },
                audio: false
            });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
        } catch (err) {
            console.error(err);
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && (Date.now() - lastScanTime > 3000)) {
                lastScanTime = Date.now();
                onTicketDetected();
            }
        }
        requestAnimationFrame(tick);
    }

    function onTicketDetected() {
        beepSound.currentTime = 0;
        beepSound.play().catch(() => {});

        banner.style.display = 'block';

        setTimeout(() => {
            banner.style.display = 'none';
        }, 2000);
    }

    startCamera();
</script>
</body>
</html>
